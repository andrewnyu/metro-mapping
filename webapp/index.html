<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Metro-Mapping — Metro area & commercial-land estimate</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
<link href="style.css?v=18" rel="stylesheet" />
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <header>
      <h1>Metro-Mapping</h1>
      <p class="sub">Functional metro area and commercial-land analytics</p>
    </header>

    <nav class="segmented view-tabs" id="viewTabs" aria-label="Map view">
      <button data-view="metro" class="active">Metro Area</button>
      <button data-view="prices">Commercial Prices</button>
    </nav>

    <div class="control" id="cityControl">
      <label>City</label>
      <select id="citySelect"></select>
    </div>

    <div class="control" id="addCityControl">
      <label>Add a city <span class="hint">— builds from OpenStreetMap</span></label>
      <div class="add-row">
        <input type="text" id="cityInput" placeholder="e.g. Davao City, Philippines" autocomplete="off" />
        <button id="addCityBtn" class="go-btn">Generate</button>
      </div>
      <input type="text" id="osmIdInput" class="osm-id-input" placeholder="Optional exact OSM ID, e.g. R3617877" autocomplete="off" />
      <div id="buildProgress" class="hidden">
        <div class="pbar"><div class="pfill" id="pfill"></div></div>
        <div class="pmsg mono" id="pmsg"></div>
      </div>
    </div>

    <div class="control">
      <label id="cityMetricsLabel">Metro metrics</label>
      <div id="cityStats" class="stats-grid"></div>
    </div>

    <div id="priceModelCard" class="model-card hidden"></div>

    <details class="settings-panel">
      <summary>Settings</summary>

      <div class="control" id="weightsControl">
        <label>Relative-index weights <span class="hint">— tune the local score live</span></label>
        <div id="weights"></div>
        <button id="resetWeights" class="link-btn">reset to defaults</button>
      </div>

      <div class="control last">
        <label>Layers</label>
        <div class="toggles">
          <label class="chk metro-option"><input type="checkbox" id="tglMetro" checked> Metro boundary</label>
          <label class="chk metro-option"><input type="checkbox" id="tglConnectors"> Connector cells</label>
          <label class="chk metro-option"><input type="checkbox" id="tglMetroOnly" checked> Metro cells only</label>
          <label class="chk"><input type="checkbox" id="tglWater"> Bodies of water</label>
          <label class="chk"><input type="checkbox" id="tglPois"> POIs</label>
        </div>
      </div>
    </details>

    <div id="legend"></div>

    <div class="control list-control">
      <label>Top cells · <span id="listMetricLabel"></span></label>
      <ol id="topList"></ol>
    </div>

    <footer>
      <span id="matchNote"></span>
      Sources: <a href="https://www.openstreetmap.org" target="_blank" rel="noopener">OSM</a> ·
      <a href="https://psa.gov.ph/classification/psgc/cities" target="_blank" rel="noopener">PSA</a> ·
      <a href="https://www.pdic.gov.ph" target="_blank" rel="noopener">PDIC/BSP</a> ·
      <a href="https://blgf.gov.ph/lgu-fiscal-data/" target="_blank" rel="noopener">BLGF</a> ·
      <a href="https://onepropertee.com" target="_blank" rel="noopener">OnePropertee</a> ·
      <a href="https://www.dotproperty.com.ph" target="_blank" rel="noopener">DotProperty</a>
    </footer>
  </aside>

  <main id="mapWrap">
    <div id="map"></div>
    <div id="tooltip" class="hidden"></div>

    <div id="detail" class="hidden">
      <button id="detailClose" title="Close">×</button>
      <div id="detailHead"></div>
      <div id="detailStats"></div>
      <div class="chart-wrap"><canvas id="compChart"></canvas></div>
      <p class="detail-foot" id="detailFoot"></p>
    </div>

    <div id="loading">Loading map &amp; data…</div>
  </main>
</div>

<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="app.js?v=18"></script>
</body>
</html>
