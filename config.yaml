# =====================================================================
# Metro-Mapping configuration
# ---------------------------------------------------------------------
# Everything that changes between cities / experiments lives here so the
# code stays generic. Edit `city.place` to point at any PH city.
# =====================================================================

city:
  # OSM-geocodable place name. Examples that work well:
  #   "Cebu City, Philippines"
  #   "Davao City, Philippines"
  #   "Iloilo City, Philippines"
  #   "Bacolod, Philippines"
  place: "Cebu City, Philippines"
  # Optional exact OSM object for the city boundary. Use N/W/R prefixes:
  #   N = node, W = way, R = relation.
  # This is tried before fuzzy Nominatim search when set.
  osm_id: null
  # Fallback exact OSM IDs used by the web app builder for troublesome names.
  # Keys are normalized, so "Puerto Princesa City" and "puerto princesa city"
  # both match.
  osm_id_fallbacks:
    bacolod city: "R11349321"
    bacolod: "R11349321"
    puerto princesa city: "R9481097"
    puerto princesa: "R9481097"
    zamboanga city: "R3617877"
  place_aliases:
    surigao: "Surigao City, Philippines"
  # How far (km) beyond the official city boundary to study. A metro area
  # spills over its core city, so we analyse a buffered region.
  study_buffer_km: 12.0

grid:
  # H3 resolution. 8 ≈ 0.46 km^2 / cell (~460 m edge), good city scale.
  # 9 ≈ 0.10 km^2 (finer, ~4x more cells, slower). 7 ≈ 5 km^2 (coarse).
  h3_resolution: 8

# Downtown / Central Business District.
cbd:
  # If lat/lng are null, the CBD is detected automatically as the peak of
  # commercial-POI kernel density. Set them to pin it manually.
  lat: null
  lng: null

# POI categories pulled from OSM and their weight as "value-generating
# establishments". Higher weight => stronger pull on nearby land value.
poi_categories:
  mall:        {tags: {shop: ["mall", "department_store", "supermarket"]},               weight: 1.0}
  office:      {tags: {office: true, building: ["office", "commercial"]},                weight: 0.9}
  transport:   {tags: {public_transport: ["station"], amenity: ["bus_station", "ferry_terminal"]}, weight: 0.8}
  school:      {tags: {amenity: ["school", "university", "college"]},                    weight: 0.5}
  hospital:    {tags: {amenity: ["hospital", "clinic"]},                                 weight: 0.5}
  government:  {tags: {amenity: ["townhall", "courthouse"], office: ["government"]},      weight: 0.6}
  bank:        {tags: {amenity: ["bank"]},                                               weight: 0.4}
  leisure:     {tags: {leisure: ["park"], tourism: ["hotel", "attraction"]},             weight: 0.3}

roads:
  # OSM 'highway' classes treated as "major" (arterials people commute on).
  major_classes: ["motorway", "trunk", "primary", "secondary"]

osm:
  # OSMnx/Overpass endpoints. The first is the default; fallbacks help when a
  # public Overpass instance is temporarily down or refusing connections.
  requests_timeout: 45
  overpass_rate_limit: false
  point_boundary_km: 8.0
  overpass_urls:
    - "https://overpass-api.de/api"
    - "https://overpass.kumi.systems/api"
    - "https://overpass.openstreetmap.ru/api"

# --- Water / land mask -------------------------------------------------
# Coastal PH cities have lots of grid cells over the sea. OSM stores inland
# water (lakes/rivers/reservoirs) as polygons, but NOT the open ocean, so we
# also keep only "reachable" land: a cell survives if it — or a neighbour —
# has road coverage, has a POI, or touches the city boundary. That single
# rule is what removes the sea.
water:
  tags:
    natural: ["water", "bay", "strait", "wetland"]
    landuse: ["reservoir", "basin"]
  require_reachable: true   # drop cells with no road/POI/boundary nearby (sea)

# --- Land-value proxy model -------------------------------------------
# The starter model is a transparent weighted sum of accessibility
# features. Replace `landvalue.py` with a supervised model once you have
# real transaction / listing prices. Distances are converted to access
# via exp(-dist/scale) so "closer = higher", with diminishing returns.
landvalue:
  decay_scale_km:
    cbd:           3.0   # how fast value falls off from downtown
    major_road:    0.6   # main-road premium is very local
    establishment: 1.5   # range over which nearby POIs lift value
  weights:
    access_cbd:          0.35   # closeness to downtown
    access_major_road:   0.15   # closeness to an arterial
    establishment_access: 0.30  # gravity access to weighted POIs
    poi_density:         0.10   # raw POI count in/around the cell
    road_density:        0.10   # local street connectivity

# --- Supervised spatial-index weights --------------------------------
# The simple constrained model learns from source-backed commercial market labels.
# Floors encode Philippine monotonic priors while the training loop tunes the
# remaining allocation using leave-one-market-area-out validation.
weight_model:
  labels_file: "reference_data/commercial_land_spatial_markets.geojson"
  artifact: "data/models/landvalue_weight_model.json"
  minimum_labels: 6
  prior_weights:
    access_cbd: 0.15
    access_major_road: 0.30
    establishment_access: 0.25
    poi_density: 0.20
    road_density: 0.10
  minimum_weights:
    access_cbd: 0.10
    access_major_road: 0.25
    establishment_access: 0.20
    poi_density: 0.15
    road_density: 0.05
  regularization_grid: [0.3, 1.0, 3.0, 10.0, 30.0, 100.0]

# --- Area-level economic context --------------------------------------
# Build this ignored/generated table from the sibling bank-deposit project:
#   python scripts/build_economic_reference.py \
#     --bank-project /path/to/ph-bank-deposits
# Optional BLGF city tax-receipt columns can be merged by that script.
economics:
  reference_file: "data/economic_features.csv"
  place_aliases: {}

# --- Supervised commercial vacant-land price model --------------------
# Listings are asking/minimum prices with provenance, not completed sales.
# The model trains across multiple cities and validates by holding out whole
# cities so population/deposit features cannot leak through a random row split.
price_model:
  market_observations_file: "reference_data/commercial_land_market_observations.json"
  top_market_anchors_file: "reference_data/commercial_land_top_market_anchors.json"
  labels_file: "data/commercial_land_price_listings.csv"
  artifact: "data/models/land_price_model.joblib"
  minimum_market_observations: 15
  minimum_market_cities: 10
  min_price_per_sqm_php: 250
  max_price_per_sqm_php: 1000000
  land_type_terms: ["land", "lot"]
  required_property_type_terms: ["commercial"]
  improvement_terms: ["house", "condo", "townhouse", "building", "improvement"]
  # Blend learned cell variation with score/area-weighted relative allocation.
  # 0 = learned model only; 1 = all local variation follows the relative index.
  relative_score_blend: 1.0
  # Where a city has enough deduplicated top-market listings, anchor their
  # robust median at this land-value-score quantile and spread it over cells.
  minimum_top_anchor_observations: 3
  # For a city without local listings, take the nearest anchored markets in
  # deposits-per-analyzed-land-cell space, scale their anchors by the exact
  # deposit-density ratio, and similarity-weight their implied baselines.
  comparable_city_fallback:
    n_neighbors: 3
    similarity_bandwidth_log: 0.75
    deposit_ratio_exponent: 1.0
    deposit_ratio_min: 0.01
    deposit_ratio_max: 100.0
    interval_min_log: 0.25
    interval_max_log: 0.65
  top_anchor_score_quantile: 0.90
  relative_score_elasticity: 0.65
  relative_multiplier_min: 0.10
  relative_multiplier_max: 1.35
  anchor_interval_z: 1.2816       # central 80% confidence interval
  anchor_interval_min_log: 0.12
  anchor_interval_max_log: 0.35
  estimator:
    learning_rate: 0.05
    max_iter: 300
    max_leaf_nodes: 5
    min_samples_leaf: 2
    l2_regularization: 1.0
  # Small grid selected on the same city-held-out folds used for reporting.
  tuning:
    max_leaf_nodes: [3, 5, 7]
    min_samples_leaf: [2, 3]
    l2_regularization: [1.0]
  market_tuning:
    min_samples_leaf: [2, 3]
    max_features: [0.7, 1.0]

# --- Metro delineation -------------------------------------------------
# The metro footprint is the set of *urban* cells contiguously connected to
# downtown. "Urban" uses an ABSOLUTE bar (not a percentile of the city's own
# distribution) so the metro grows with the real built-up extent instead of
# being capped at a fixed fraction of the city. A cell counts as urban if it
# has enough establishments OR a dense-enough local road grid — both are per
# H3 cell (~0.46 km² at res 8). Density/land-value ranks stay relative; they
# are only for price prediction, not for the metro boundary.
metro:
  min_poi_per_cell: 3       # >= this many POIs in the cell -> urban
  min_road_km_per_cell: 4.0 # OR >= this many km of road in the cell -> urban
  # Road-only cells also need nearby establishment gravity before they count
  # as urban. This keeps rural corridors inside huge city limits from becoming
  # metro, without falling back to a relative percentile cut.
  min_establishment_access_for_road_cell: 3.0
  # Bridge small excluded non-land gaps (water channels, mapped/removed water)
  # up to this many H3 rings when growing the metro out from downtown. Ordinary
  # non-urban land is not bridged, so mountain/rural gaps do not attach places
  # like Toledo to Metro Cebu.
  bridge_gap: 2
  # Connector cells are weak-but-supported land cells used only to attach a
  # meaningful nearby urban cluster to the CBD-connected metro. They are kept
  # separate from urban cells so the web app can highlight/audit them.
  connector_gap: 2
  connector_min_component_cells: 12
  connector_min_road_km_per_cell: 2.0
  connector_min_establishment_access: 3.0
  # Relative built-up score kept only as a display/colour metric in the web app.
  builtup_weights:
    poi_density:  0.5
    road_density: 0.5

paths:
  data_dir: "data"
  cache_subdir: "osm_cache"
