# =====================================================================
# Metro-Mapping configuration
# ---------------------------------------------------------------------
# Everything that changes between cities / experiments lives here so the
# code stays generic. Edit `city.place` to point at any PH city.
# =====================================================================

city:
  # OSM-geocodable place name. Examples that work well:
  #   "Cebu City, Philippines"
  #   "Davao City, Philippines"
  #   "Iloilo City, Philippines"
  #   "Bacolod, Philippines"
  place: "Cebu City, Philippines"
  # Optional exact OSM object for the city boundary. Use N/W/R prefixes:
  #   N = node, W = way, R = relation.
  # This is tried before fuzzy Nominatim search when set.
  osm_id: null
  # Fallback exact OSM IDs used by the web app builder for troublesome names.
  # Keys are normalized, so "Zamboanga City" and "zamboanga city" both match.
  osm_id_fallbacks:
    zamboanga city: "R3617877"
  # How far (km) beyond the official city boundary to study. A metro area
  # spills over its core city, so we analyse a buffered region.
  study_buffer_km: 12.0

grid:
  # H3 resolution. 8 ≈ 0.46 km^2 / cell (~460 m edge), good city scale.
  # 9 ≈ 0.10 km^2 (finer, ~4x more cells, slower). 7 ≈ 5 km^2 (coarse).
  h3_resolution: 8

# Downtown / Central Business District.
cbd:
  # If lat/lng are null, the CBD is detected automatically as the peak of
  # commercial-POI kernel density. Set them to pin it manually.
  lat: null
  lng: null

# POI categories pulled from OSM and their weight as "value-generating
# establishments". Higher weight => stronger pull on nearby land value.
poi_categories:
  mall:        {tags: {shop: ["mall", "department_store", "supermarket"]},               weight: 1.0}
  office:      {tags: {office: true, building: ["office", "commercial"]},                weight: 0.9}
  transport:   {tags: {public_transport: ["station"], amenity: ["bus_station", "ferry_terminal"]}, weight: 0.8}
  school:      {tags: {amenity: ["school", "university", "college"]},                    weight: 0.5}
  hospital:    {tags: {amenity: ["hospital", "clinic"]},                                 weight: 0.5}
  government:  {tags: {amenity: ["townhall", "courthouse"], office: ["government"]},      weight: 0.6}
  bank:        {tags: {amenity: ["bank"]},                                               weight: 0.4}
  leisure:     {tags: {leisure: ["park"], tourism: ["hotel", "attraction"]},             weight: 0.3}

roads:
  # OSM 'highway' classes treated as "major" (arterials people commute on).
  major_classes: ["motorway", "trunk", "primary", "secondary"]

# --- Water / land mask -------------------------------------------------
# Coastal PH cities have lots of grid cells over the sea. OSM stores inland
# water (lakes/rivers/reservoirs) as polygons, but NOT the open ocean, so we
# also keep only "reachable" land: a cell survives if it — or a neighbour —
# has road coverage, has a POI, or touches the city boundary. That single
# rule is what removes the sea.
water:
  tags:
    natural: ["water", "bay", "strait", "wetland"]
    landuse: ["reservoir", "basin"]
  require_reachable: true   # drop cells with no road/POI/boundary nearby (sea)

# --- Land-value proxy model -------------------------------------------
# The starter model is a transparent weighted sum of accessibility
# features. Replace `landvalue.py` with a supervised model once you have
# real transaction / listing prices. Distances are converted to access
# via exp(-dist/scale) so "closer = higher", with diminishing returns.
landvalue:
  decay_scale_km:
    cbd:           3.0   # how fast value falls off from downtown
    major_road:    0.6   # main-road premium is very local
    establishment: 1.5   # range over which nearby POIs lift value
  weights:
    access_cbd:          0.35   # closeness to downtown
    access_major_road:   0.15   # closeness to an arterial
    establishment_access: 0.30  # gravity access to weighted POIs
    poi_density:         0.10   # raw POI count in/around the cell
    road_density:        0.10   # local street connectivity

# --- Metro delineation -------------------------------------------------
# A cell is "urban" if its built-up score is above this percentile. The
# metro = the urban cells contiguously connected to the CBD cell.
metro:
  urban_percentile: 70
  builtup_weights:
    poi_density:  0.5
    road_density: 0.5

paths:
  data_dir: "data"
  cache_subdir: "osm_cache"
